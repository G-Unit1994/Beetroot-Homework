<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Підключення Css -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/styles.css">
    <title>Who is using</title>
</head>
<body>
    <div class="documentation">
        <header class="documentation__header">
          <div class="container">
            <div class="documentation__header-inner">
              <div class="documentation__header-toolbar">
                <div class="documentation__header-languages-menu">
                  <button type="button" class="documentation__header__switch-lang-btn">ENG</button>
                </div>
                <nav class="documentation__header-nav">
                  <ul class="documentation__header-list">
                    <li class="documentation__header-list-item">
                      <a  href="#"target="_blank" rel="noopener noreferrer"class="documentation__header-list-link">Documentation</a>
                    </li>
                    <li class="documentation__header-list-item">
                      <a href="#"  target="_blank"  rel="noopener noreferrer"class="documentation__header-list-link">Who's using</a >
                    </li>
                  </ul>
                </nav>
              </div>
              <div class="header__logo">
                <a href="#">
                  <img src="./images/header-logo.svg" alt="logo" />
                </a>
              </div>
            </div>
          </div>
        </header>
        <main class="main">
            <div class="container">
                <section class="socials">
                <h2 class="socials__title">Who’s using</h2>
                <hr class="socials__horizontal-line" />
                <div class="socials__block">
                    <a href="https://www.facebook.com/" target="_blank">
                    <div class="socials__social-flip-card">
                        <div class="socials__social-flip-inner">
                        <div class="socials__social-flip-front">
                            <img src="./images/black-images/facebook-logo-black.svg" alt="facebook black" class="socials__social-img">
                        </div>
                        <div class="socials__social-flip-back">
                            <img src="./images/white-images/facebook-logo-white.svg" alt="facebook white" class="socials__social-img">
                        </div>
                        </div>
                    </div>
                </a>
                <a href="https://www.instagram.com/" target="_blank">
                    <div class="socials__social-flip-card">
                    <div class="socials__social-flip-inner">
                        <div class="socials__social-flip-front">
                        <img src="./images/black-images/instagram-logo-black.svg" alt="instagram black" class="socials__social-img--top">
                        </div>
                        <div class="socials__social-flip-back">
                        <img src="./images/white-images/instagram-logo-white.svg" alt="instagram white" class="socials__social-img--top">
                        </div>
                    </div>
                    </div>
                </a>
                <a href="https://www.shopify.com/" target="_blank">
                    <div class="socials__social-flip-card">
                    <div class="socials__social-flip-inner">
                        <div class="socials__social-flip-front">
                        <img src="./images/black-images/shopify-logo-black.svg" alt="shopify black" class="socials__social-img">
                        </div>
                        <div class="socials__social-flip-back">
                        <img src="./images/white-images/shopify-logo-white.svg" alt="shopify white" class="socials__social-img">
                        </div>
                    </div>
                    </div>
                </a>
                <a href="https://www.skype.com/en" target="_blank">
                    <div class="socials__social-flip-card">
                    <div class="socials__social-flip-inner">
                        <div class="socials__social-flip-front">
                        <img src="./images/black-images/skype-logo-black.svg" alt="skype black" class="socials__social-img">
                        </div>
                        <div class="socials__social-flip-back">
                        <img src="./images/white-images/skype-logo-white.svg" alt="skype white" class="socials__social-img">
                        </div>
                    </div>
                    </div>
                </a>
                <a href="https://www.pinterest.com/" target="_blank">
                    <div class="socials__social-flip-card">
                    <div class="socials__social-flip-inner">
                        <div class="socials__social-flip-front">
                        <img src="./images/black-images/pinterest-logo-black.svg" alt="pinterest black" class="socials__social-img">
                        </div>
                        <div class="socials__social-flip-back">
                        <img src="./images/white-images/pinterest-logo-white.svg" alt="pinterest white" class="socials__social-img">
                        </div>
                    </div>
                    </div>
                </a>
                <a href="https://www.wix.com/" target="_blank">
                    <div class="socials__social-flip-card">
                    <div class="socials__social-flip-inner">
                        <div class="socials__social-flip-front">
                        <img src="./images/black-images/wix-logo-black.svg" alt="wix black" class="socials__social-img">
                        </div>
                        <div class="socials__social-flip-back">
                        <img src="./images/white-images/wix-logo-white.svg" alt="wix white" class="socials__social-img">
                        </div>
                    </div>
                    </div>
                </a>
                <a href="https://www.salesforce.com/" target="_blank">
                    <div class="socials__social-flip-card">
                        <div class="socials__social-flip-inner">
                            <div class="socials__social-flip-front">
                            <img src="./images/black-images/saleforse-logo-black.svg" alt="saleforce black" class="socials__social-img">
                            </div>
                            <div class="socials__social-flip-back">
                            <img src="./images/white-images/saleforse-logo-white.svg" alt="saleforce white" class="socials__social-img">
                            </div>
                        </div>
                        </div>
                </a>
                <a href="https://soundcloud.com/" target="_blank">
                    <div class="socials__social-flip-card">
                        <div class="socials__social-flip-inner">
                            <div class="socials__social-flip-front">
                            <img src="./images/black-images/soundcloud-logo-black.svg" alt="soundcloud black" class="socials__social-img">
                            </div>
                            <div class="socials__social-flip-back">
                            <img src="./images/white-images/soundcloud-logo-white.svg" alt="saleforce white" class="socials__social-img">
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            <hr class="socials__horizontal-line" />
                </section>
            </main>
        </div>
</body>
</html>
